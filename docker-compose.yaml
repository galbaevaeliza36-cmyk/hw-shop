version: "3.9"

services:
  web:
    build: .
    container_name: hw_shop_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: hw_shop_db
    restart: always
    environment:
      POSTGRES_DB: shopdb
      POSTGRES_USER: shopuser
      POSTGRES_PASSWORD: shopsecret
    ports:
      - "5432:5432"